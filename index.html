<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#030611" />
    <meta name="description" content="Omni Trading — the infinite exchange. Photonic-powered swaps across 14+ chains." />
    <title>OMNI · Infinite Exchange</title>
    <style>
      /* Pre-mount skeleton so first paint isn't a white flash */
      html, body { margin: 0; padding: 0; background: #030611; color: #e6f0ff; }
      body { min-height: 100vh; font-family: system-ui, -apple-system, sans-serif; }
      #root { min-height: 100vh; }
      .boot {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: #030611; z-index: -1;
      }
      .boot-spinner {
        width: 42px; height: 42px; border-radius: 50%;
        border: 2px solid rgba(124,200,255,0.25); border-top-color: #7cc8ff;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="boot"><div class="boot-spinner"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
